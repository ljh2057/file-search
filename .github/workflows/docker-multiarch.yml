name: Build & Push Multi-Arch Docker Image

"on":
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  IMAGE_NAME: file-search

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 从官方 x86 镜像中提取 JAR，避免从源码编译（源码不完整）
      - name: Extract JAR from official image
        run: |
          docker pull --platform linux/amd64 ayound/file-search:1.0.6
          id=$(docker create --platform linux/amd64 ayound/file-search:1.0.6)
          docker cp $id:/fsearch/file-search-1.0.6-SNAPSHOT.jar ./file-search-1.0.6-SNAPSHOT.jar
          docker rm $id
          ls -lh file-search-1.0.6-SNAPSHOT.jar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.arm64
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest,${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:1.0.6
          cache-from: type=gha
          cache-to: type=gha,mode=max
